# Workflow Configuration

# General workflow settings
workflow:
  name: "Primitive State Segmentation and Clustering"
  description: "Standard ML workflow for processing and training on input data."
  appliance_name: "dishwasher" 
  resume: true
  sequence_id: "114514"

# Step-specific configurations
steps:
  extract_active_data:
    enabled: true
    input_file: "/home/scnu2023024258/data/datasets/ukdale_extracted/house1/washing_machine.csv"
    power_threshold: 1.0
    min_duration_seconds: 30
    context_seconds: 120
    set_input_root: true

  data_loader:
    enabled: true
    input_folder: "input"
    supported_formats: [".npy", ".txt"]
    
  data_processor:
    enabled: false
    normalization: true
    save_figures: true

  wavelet_separation:
    enabled: true
    is_shape_dtw: false
    plot_count: 0

  feature_extract:
    enabled: true
    data_path: ""
    seq_len_path: ""
    model_name: "bilstm_ae"
    latent_dim: 64
    epochs: 50
    batch_size: 32
    learning_rate: 0.001
    patience: 5
    attention_size: 32
  
  time_clustering:
    enabled: true
    data_path: ""
    feature_path: ""
    seq_len_path: ""
    eps: 1.0
    min_pts: 20
    metric: "euclidean"
    normalization_method: "zscore"
    col_index: 2
  

# Model hyperparameters
models:
  DummyModel:
    learning_rate: 0.01
    epochs: 10
    batch_size: 32
