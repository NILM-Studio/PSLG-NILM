# Workflow Configuration

# General workflow settings
workflow:
  name: "MachineLearningWorkflow"
  description: "Standard ML workflow for processing and training on input data."

# Step-specific configurations
steps:
  data_loader:
    enabled: true
    input_folder: "input"
    supported_formats: [".npy", ".txt"]
    
  data_processor:
    enabled: true
    normalization: true
    save_figures: true

  wavelet_separation:
    enabled: true
    is_shape_dtw: false
    plot_count: 0
    
  model_training:
    enabled: true
    model_name: "DummyModel"
    task: "train_and_predict"

# Model hyperparameters
models:
  DummyModel:
    learning_rate: 0.01
    epochs: 10
    batch_size: 32
